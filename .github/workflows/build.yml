name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Java 17 · Maven Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: tongxin
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify
        run: ./mvnw verify -DskipTests
        env:
          DB_URL: jdbc:mysql://localhost:3306/tongxin?useSSL=false&allowPublicKeyRetrieval=true
          DB_USERNAME: root
          DB_PASSWORD: test123
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
