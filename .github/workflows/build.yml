name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.3
        env:
          MYSQL_ROOT_PASSWORD: test123456
          MYSQL_DATABASE: tongxin
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw verify -DskipTests
        working-directory: tongxin-project
        env:
          DB_URL: jdbc:mysql://localhost:3306/tongxin?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          DB_USERNAME: root
          DB_PASSWORD: test123456
          AMAP_KEY: test_key
          AMAP_SEC: test_sec
          JWT_SECRET: test-jwt-secret-for-ci-only-not-production

      - name: Run tests
        run: ./mvnw test
        working-directory: tongxin-project
        env:
          DB_URL: jdbc:mysql://localhost:3306/tongxin?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          DB_USERNAME: root
          DB_PASSWORD: test123456
          AMAP_KEY: test_key
          AMAP_SEC: test_sec
          JWT_SECRET: test-jwt-secret-for-ci-only-not-production
