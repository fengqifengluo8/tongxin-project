# ==========================================
# Development profile configuration
# ==========================================

# Database - local MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/tongxin?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:your_db_password_here}

# MyBatis SQL logging (stdout for dev debugging)
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Verbose logging
logging.level.com.example.tongxinproject=debug

# Devtools auto-restart
spring.devtools.restart.enabled=true

# CORS - allow all for LAN multi-device testing
cors.allowed-origins=*

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# Amap dev keys — replace with your own keys from https://console.amap.com/
amap.key=${AMAP_KEY:your_amap_key_here}
amap.sec=${AMAP_SEC:your_amap_secret_here}

# JWT dev key — replace with a strong random key for production
jwt.secret=${JWT_SECRET:your_jwt_secret_here}

spring.sql.init.mode=never

# ========== HTTPS/TLS (浏览器定位API必需) ==========
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:your_keystore_password}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.port=6061
server.address=0.0.0.0
server.servlet.session.cookie.http-only=true

# HTTP重定向端口(设为0随机,避免与HTTPS 6061冲突)
server.http.port=0
