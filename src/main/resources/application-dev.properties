# ==========================================
# Development profile configuration
# ==========================================

# Database - local MySQL with relaxed SSL
spring.datasource.url=jdbc:mysql://localhost:3306/tongxin?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:123456}

# MyBatis SQL logging (stdout for dev debugging)
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Verbose logging for development
logging.level.com.example.tongxinproject=debug

# Devtools auto-restart
spring.devtools.restart.enabled=true

# CORS - allow all origins for LAN multi-device testing
cors.allowed-origins=*

# Actuator - expose all for dev
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# Amap dev keys
amap.key=${AMAP_KEY:41772c41fd593be3065a08fafb13e4e3}
amap.sec=${AMAP_SEC:096d187e6ad8350db2768874cfe32abc}

# JWT dev key
jwt.secret=${JWT_SECRET:tongxin-project-jwt-dev-only-not-for-production}

# Initialization - 仅在首次部署时使用
spring.sql.init.mode=never

# ========== HTTPS/TLS配置 ==========
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
# HTTPS主端口（局域网防火墙通常放行）
server.port=6061
# HTTP重定向端口
server.http.port=8443

# 绑定到所有网络接口（允许局域网访问）
server.address=0.0.0.0

# Session Cookie 安全
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
