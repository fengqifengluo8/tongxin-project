spring.application.name=tongxin-project

# Active profile (override via SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Configuration
server.port=${SERVER_PORT:6061}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tongxin?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus Configuration
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.example.tongxinproject.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# Logging
logging.level.com.example.tongxinproject=${LOG_LEVEL:debug}

# Amap Configuration (必须通过环境变量设置，不留硬编码默认值)
amap.key=${AMAP_KEY}
amap.sec=${AMAP_SEC}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# JWT Configuration (生产环境必须设置强随机密钥)
jwt.secret=${JWT_SECRET:changeme-please-set-JWT_SECRET-env-var}
jwt.expiration=${JWT_EXPIRATION:86400}
