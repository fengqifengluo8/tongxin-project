# ==========================================
# Production profile configuration
# ==========================================

# Database - MUST use SSL in production
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/tongxin?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=false

# MyBatis SQL logging - DO NOT use stdout in production
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# Production logging - info level, reduce noise
logging.level.com.example.tongxinproject=info
logging.level.org.apache.ibatis=warn

# CORS - restrict to known frontend origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:6061}

# Actuator - minimal exposure
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Initialization - do NOT auto-seed schema
spring.sql.init.mode=never

# Server error messages - do not expose internals
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# HTTPS/TLS (requires keystore file, uncomment when cert available)
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat
# server.port=8443
# server.http.port=6061

# HSTS (enable after HTTPS is configured)
# server.servlet.session.cookie.http-only=true
# server.servlet.session.cookie.secure=true
