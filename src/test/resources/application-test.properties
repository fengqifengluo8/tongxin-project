# ==========================================
# Test profile configuration - H2 in-memory database
# ==========================================
spring.datasource.url=jdbc:h2:mem:tongxin;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.hibernate.ddl-auto=none

# MyBatis (H2 compatible)
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto

# Test logging
logging.level.com.example.tongxinproject=debug

# Amap - use mock values in tests
amap.key=test_key
amap.sec=test_sec

# JWT
jwt.secret=test-jwt-secret-for-testing-only-not-production-use
jwt.expiration=3600

# CORS permissive for tests
cors.allowed-origins=*

# Disable production security in tests
spring.autoconfigure.exclude=
